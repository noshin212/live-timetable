<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ライブ・タイムテーブル作成</title>
  
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
  
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <div class="sticky-header-area">
    <div class="header-flex">
      <h2>ライブ進行表</h2>
      <div class="btn-group">
        <button class="btn img-btn" onclick="window.downloadAsImage()">📷 画像</button>
        <button class="btn excel-btn" onclick="window.downloadAsExcel()">📊 Excel</button>
        <button class="btn share-btn" onclick="window.generateShareLink()">🔗 共有URL</button>
        <button class="btn reset-btn" onclick="window.clearData()">リセット</button>
      </div>
    </div>
    
    <div id="status">接続状態を確認中...</div>

    <div class="tab-container" id="tabContainer"></div>
    
    <div class="controls">
      <label>開始時間: <input type="time" id="startTime" value="13:00"></label>
      <hr style="border-top: 1px solid #ddd; border-bottom: none; margin: 10px 0;">
      <input type="text" id="bandName" placeholder="バンド名">
      <input type="number" id="duration" placeholder="分数" value="20" style="width: 60px;"> 分
      <br><br>
      <button onclick="window.addItemFromInput('band')">🎸 バンド</button>
      <button onclick="window.addItemFromInput('setup')">🔌 転換(10分)</button>
      <button onclick="window.addItemFromInput('break')">☕ 休憩</button>
    </div>
  </div>

  <div id="capture-area">
    <div id="timetable"></div>
  </div>

  <div id="tabModalOverlay" class="modal-overlay">
    <div class="modal-content">
      <h3>新しい日程の追加</h3>
      <input type="text" id="newTabNameInput" class="modal-input" placeholder="例: 2日目">
      <div class="modal-actions">
        <button class="btn reset-btn" onclick="window.closeAddTabModal()">キャンセル</button>
        <button class="btn share-btn" onclick="window.confirmAddTab()">追加する</button>
      </div>
    </div>
  </div>

  <script type="module" src="./main.js?v=3"></script>
</body>
</html>
